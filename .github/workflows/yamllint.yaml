name: yamllint
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  yamllint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - id: changed-files
        uses: tj-actions/changed-files@v42
        with:
          files: |
            *.yaml
            *.yml
      - if: |
          steps.changed-files.outputs.any_changed == 'true'
        run: |
          yamllint -c .yamllint.yaml .
